<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Pro Exchange Terminal</title>

<!-- TradingView Lightweight Charts -->
<script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>

<style>
  body {
    margin: 0;
    background: #0b0f14;
    color: #fff;
    font-family: Arial, sans-serif;
    overflow: hidden;
  }

  .container {
    display: flex;
    height: 100vh;
  }

  /* Sidebar */
  .sidebar {
    width: 70px;
    background: #111827;
    border-right: 1px solid #1f2937;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 15px 0;
    gap: 18px;
  }

  .logo {
    width: 34px;
    height: 34px;
    background: #3b82f6;
    border-radius: 10px;
  }

  .icon {
    width: 28px;
    height: 28px;
    background: #1f2937;
    border-radius: 8px;
  }

  /* Main */
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
  }

  .topbar {
    height: 52px;
    background: #0f172a;
    border-bottom: 1px solid #1f2937;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 16px;
  }

  .price {
    font-weight: bold;
    color: #22c55e;
  }

  .content {
    flex: 1;
    display: flex;
    overflow: hidden;
  }

  /* Chart */
  .chart {
    flex: 1;
    margin: 10px;
    border-radius: 10px;
    border: 1px solid #1f2937;
    background: #0b1220;
    overflow: hidden;
  }

  /* Right panel */
  .right {
    width: 360px;
    border-left: 1px solid #1f2937;
    display: flex;
    flex-direction: column;
  }

  .panel {
    flex: 1;
    margin: 10px;
    background: #0f172a;
    border: 1px solid #1f2937;
    border-radius: 10px;
    padding: 10px;
    overflow: hidden;
  }

  input {
    width: 100%;
    padding: 10px;
    margin-top: 8px;
    background: #111827;
    border: 1px solid #1f2937;
    color: white;
    border-radius: 6px;
  }

  button {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
    border: none;
    border-radius: 6px;
    font-weight: bold;
    cursor: pointer;
  }

  .buy { background: #22c55e; }
  .sell { background: #ef4444; }

  .book {
    font-size: 12px;
    margin-top: 10px;
    height: 200px;
    overflow: auto;
  }

  .up { color: #22c55e; }
  .down { color: #ef4444; }

  .bottom {
    height: 220px;
    border-top: 1px solid #1f2937;
    background: #0f172a;
    padding: 10px;
    overflow: auto;
  }

  table {
    width: 100%;
    font-size: 12px;
  }

  th, td {
    text-align: left;
    padding: 5px;
    color: #cbd5e1;
  }

  th { color: #94a3b8; }
</style>
</head>

<body>

<div class="container">

  <!-- Sidebar -->
  <div class="sidebar">
    <div class="logo"></div>
    <div class="icon"></div>
    <div class="icon"></div>
    <div class="icon"></div>
  </div>

  <!-- Main -->
  <div class="main">

    <!-- Topbar -->
    <div class="topbar">
      <div>BTC / USDT</div>
      <div class="price" id="price">$0.00</div>
    </div>

    <!-- Content -->
    <div class="content">

      <!-- Chart -->
      <div id="chart" class="chart"></div>

      <!-- Right -->
      <div class="right">

        <div class="panel">

          <h3>Trade</h3>

          <input id="amount" placeholder="BTC amount"/>

          <button class="buy" onclick="buy()">BUY</button>
          <button class="sell" onclick="sell()">SELL</button>

          <p id="balance" style="color:#94a3b8;margin-top:10px;">
            Balance: $10000
          </p>

          <h4>Order Book</h4>
          <div class="book" id="book"></div>

        </div>

      </div>

    </div>

    <!-- Bottom -->
    <div class="bottom">
      <h3>Positions</h3>

      <table>
        <thead>
          <tr>
            <th>Asset</th>
            <th>Size</th>
            <th>Entry</th>
            <th>Current</th>
            <th>PnL</th>
          </tr>
        </thead>
        <tbody id="positions"></tbody>
      </table>
    </div>

  </div>
</div>

<script>

/* ================= STATE ================= */
let price = 0;
let balance = 10000;
let positions = [];

/* ================= UI ================= */
const priceEl = document.getElementById("price");
const balanceEl = document.getElementById("balance");
const positionsEl = document.getElementById("positions");
const bookEl = document.getElementById("book");

/* ================= LIVE PRICE (BINANCE) ================= */
const tradeWS = new WebSocket("wss://stream.binance.com:9443/ws/btcusdt@trade");

tradeWS.onmessage = (event) => {
  const data = JSON.parse(event.data);
  price = parseFloat(data.p);

  priceEl.innerText = "$" + price.toFixed(2);

  updatePositions();
};

/* ================= ORDER BOOK (REAL) ================= */
const depthWS = new WebSocket("wss://stream.binance.com:9443/ws/btcusdt@depth10@100ms");

depthWS.onmessage = (event) => {
  const data = JSON.parse(event.data);

  let html = "";

  data.bids.slice(0, 6).forEach(b => {
    html += `<div class="up">BUY ${parseFloat(b[0]).toFixed(2)}</div>`;
  });

  data.asks.slice(0, 6).forEach(a => {
    html += `<div class="down">SELL ${parseFloat(a[0]).toFixed(2)}</div>`;
  });

  bookEl.innerHTML = html;
};

/* ================= CHART ================= */
const chart = LightweightCharts.createChart(document.getElementById("chart"), {
  layout: {
    background: { color: "#0b1220" },
    textColor: "#cbd5e1",
  },
  grid: {
    vertLines: { color: "#1f2937" },
    horzLines: { color: "#1f2937" },
  }
});

const candleSeries = chart.addCandlestickSeries();

/* LIVE CANDLES */
let candles = [];

const klineWS = new WebSocket(
  "wss://stream.binance.com:9443/ws/btcusdt@kline_1m"
);

klineWS.onmessage = (event) => {
  const msg = JSON.parse(event.data);
  const k = msg.k;

  const candle = {
    time: k.t / 1000,
    open: parseFloat(k.o),
    high: parseFloat(k.h),
    low: parseFloat(k.l),
    close: parseFloat(k.c)
  };

  const index = candles.findIndex(c => c.time === candle.time);

  if (index >= 0) candles[index] = candle;
  else candles.push(candle);

  candles = candles.slice(-120);
  candleSeries.setData(candles);
};

/* ================= TRADING ================= */
function buy() {
  const amt = parseFloat(document.getElementById("amount").value);
  if (!amt || price === 0) return;

  const cost = amt * price;
  if (cost > balance) return alert("Insufficient balance");

  balance -= cost;

  positions.push({
    size: amt,
    entry: price
  });

  updateUI();
}

function sell() {
  const amt = parseFloat(document.getElementById("amount").value);
  if (!amt || price === 0) return;

  const pos = positions.find(p => p.size >= amt);
  if (!pos) return alert("No position");

  pos.size -= amt;

  balance += amt * price;

  if (pos.size <= 0) {
    positions = positions.filter(p => p.size > 0);
  }

  updateUI();
}

/* ================= POSITIONS ================= */
function updatePositions() {
  positionsEl.innerHTML = "";

  positions.forEach(p => {
    const pnl = (price - p.entry) * p.size;

    positionsEl.innerHTML += `
      <tr>
        <td>BTC</td>
        <td>${p.size.toFixed(4)}</td>
        <td>${p.entry.toFixed(2)}</td>
        <td>${price.toFixed(2)}</td>
        <td class="${pnl >= 0 ? 'up' : 'down'}">
          ${pnl.toFixed(2)}
        </td>
      </tr>
    `;
  });
}

/* ================= UI UPDATE ================= */
function updateUI() {
  balanceEl.innerText = "Balance: $" + balance.toFixed(2);
  updatePositions();
}

</script>

</body>
</html>
