<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Binary Options Terminal</title>

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0b0f14;
    color: white;
    overflow: hidden;
  }

  .container {
    display: flex;
    height: 100vh;
  }

  /* LEFT PANEL */
  .left {
    width: 320px;
    background: #0f172a;
    border-right: 1px solid #1f2937;
    padding: 10px;
  }

  .mode-btn {
    width: 100%;
    padding: 10px;
    margin: 6px 0;
    border: none;
    border-radius: 6px;
    background: #111827;
    color: white;
    cursor: pointer;
  }

  .active {
    background: #3b82f6 !important;
  }

  input {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
    background: #111827;
    border: 1px solid #1f2937;
    color: white;
    border-radius: 6px;
  }

  button.trade {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border: none;
    border-radius: 6px;
    font-weight: bold;
    cursor: pointer;
  }

  .buy { background: #22c55e; }
  .sell { background: #ef4444; }

  /* CENTER */
  .center {
    flex: 1;
    display: flex;
    flex-direction: column;
  }

  .topbar {
    height: 50px;
    background: #0f172a;
    border-bottom: 1px solid #1f2937;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 15px;
  }

  .price {
    font-size: 18px;
    font-weight: bold;
    color: #22c55e;
  }

  .chart {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #0b1220;
    margin: 10px;
    border-radius: 10px;
    border: 1px solid #1f2937;
  }

  /* RIGHT */
  .right {
    width: 320px;
    background: #0f172a;
    border-left: 1px solid #1f2937;
    padding: 10px;
    overflow: auto;
  }

  .box {
    background: #111827;
    padding: 10px;
    border-radius: 10px;
    margin-bottom: 10px;
  }

  .result {
    font-size: 14px;
  }

  .win { color: #22c55e; }
  .lose { color: #ef4444; }

</style>
</head>

<body>

<div class="container">

  <!-- LEFT -->
  <div class="left">
    <h3>Binary Modes</h3>

    <button class="mode-btn active" onclick="setMode('overunder')">Over / Under</button>
    <button class="mode-btn" onclick="setMode('evenodd')">Even / Odd</button>
    <button class="mode-btn" onclick="setMode('matchdiff')">Matches / Differs</button>

    <input id="stake" placeholder="Stake $" />
    
    <button class="trade buy" onclick="trade('UP')">UP / EVEN / MATCH</button>
    <button class="trade sell" onclick="trade('DOWN')">DOWN / ODD / DIFF</button>

    <div class="box">
      <div>Balance</div>
      <h3 id="balance">$10000</h3>
    </div>

    <div class="box">
      <div>Countdown</div>
      <h2 id="timer">30</h2>
    </div>
  </div>

  <!-- CENTER -->
  <div class="center">

    <div class="topbar">
      <div>BTC / USD (Binary Market)</div>
      <div class="price" id="price">0</div>
    </div>

    <div class="chart">
      Live Price Stream Active
    </div>

  </div>

  <!-- RIGHT -->
  <div class="right">
    <h3>Results</h3>
    <div id="results"></div>
  </div>

</div>

<script>

/* ================= STATE ================= */
let mode = "overunder";
let price = 0;
let lastPrice = 0;
let balance = 10000;

let currentDigit = 0;
let lastDigit = 0;

let timer = 30;
let interval;

/* ================= UI ================= */
const priceEl = document.getElementById("price");
const balanceEl = document.getElementById("balance");
const resultsEl = document.getElementById("results");
const timerEl = document.getElementById("timer");

/* ================= MODE ================= */
function setMode(m) {
  mode = m;
  document.querySelectorAll(".mode-btn").forEach(b => b.classList.remove("active"));
  event.target.classList.add("active");
}

/* ================= LIVE PRICE (BINANCE) ================= */
const ws = new WebSocket("wss://stream.binance.com:9443/ws/btcusdt@trade");

ws.onmessage = (e) => {
  const data = JSON.parse(e.data);

  lastPrice = price;
  price = parseFloat(data.p);

  priceEl.innerText = price.toFixed(2);

  lastDigit = String(lastPrice).slice(-1);
  currentDigit = String(price).slice(-1);
};

/* ================= TIMER ================= */
function startTimer() {
  clearInterval(interval);

  timer = 30;

  interval = setInterval(() => {
    timer--;
    timerEl.innerText = timer;

    if (timer <= 0) {
      settle();
      timer = 30;
    }
  }, 1000);
}

/* ================= TRADE ================= */
let trades = [];

function trade(dir) {
  let stake = parseFloat(document.getElementById("stake").value);
  if (!stake || stake <= 0 || stake > balance) return;

  balance -= stake;

  trades.push({
    mode,
    dir,
    entryPrice: price,
    entryDigit: currentDigit,
    stake
  });

  updateBalance();
}

/* ================= SETTLE ================= */
function settle() {
  trades.forEach(t => {

    let win = false;

    if (t.mode === "overunder") {
      win = (price > t.entryPrice && t.dir === "UP") ||
            (price < t.entryPrice && t.dir === "DOWN");
    }

    if (t.mode === "evenodd") {
      win = (parseInt(currentDigit) % 2 === 0 && t.dir === "UP") ||
            (parseInt(currentDigit) % 2 !== 0 && t.dir === "DOWN");
    }

    if (t.mode === "matchdiff") {
      win = (currentDigit === t.entryDigit && t.dir === "UP") ||
            (currentDigit !== t.entryDigit && t.dir === "DOWN");
    }

    let payout = win ? t.stake * 1.8 : 0;

    balance += payout;

    showResult(t, win, payout);
  });

  trades = [];
  updateBalance();
}

/* ================= RESULTS ================= */
function showResult(t, win, payout) {
  resultsEl.innerHTML = `
    <div class="result ${win ? 'win' : 'lose'}">
      ${t.mode.toUpperCase()} → ${win ? "WIN" : "LOSE"} +$${payout.toFixed(2)}
    </div>
  ` + resultsEl.innerHTML;
}

/* ================= BALANCE ================= */
function updateBalance() {
  balanceEl.innerText = "$" + balance.toFixed(2);
}

/* ================= START ================= */
startTimer();

</script>

</body>
</html>
